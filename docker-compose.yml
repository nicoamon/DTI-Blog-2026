name: dti-blog

services:
  db:
    image: mariadb:11
    container_name: dti-blog-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    command: --max_allowed_packet=512M

  wordpress:
    image: wordpress:php8.3-apache
    container_name: dti-blog-wp
    restart: unless-stopped
    depends_on:
      - db
    ports:
      # localhost only — Caddy reverse-proxies to this
      - "127.0.0.1:8090:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: wordpress
      # Behind Caddy + Cloudflare: trust X-Forwarded-Proto so WP builds https
      # URLs and avoids redirect loops.
      WORDPRESS_CONFIG_EXTRA: |
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
          $$_SERVER['HTTPS'] = 'on';
        }
        define('FS_METHOD', 'direct');
    volumes:
      - wp_data:/var/www/html
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
      # Serve WordPress under the /blog URL path (dtisolution.id/blog)
      - ./blog-subdir.conf:/etc/apache2/conf-enabled/zz-blog.conf:ro

volumes:
  db_data:
  wp_data:
